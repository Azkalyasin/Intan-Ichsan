<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wedding | Digital Invitation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Background Audio -->
    <audio id="bg-audio" src="audio.mp4" loop preload="auto"></audio>

    <!-- Star Background Layer -->
    <div id="stars-container"></div>

    <!-- Opening Screen -->
    <div class="opening-screen" id="openingScreen">
        <div class="heart-wrapper">
            <div class="heart-icon" id="heartIcon"></div>
        </div>
        <div class="btn-open-wrapper">
            <button class="btn-open" id="openBtn">Open Invitation</button>
        </div>
    </div>

    <!-- Main Content Wrapper -->
    <main class="invitation-container">
        <!-- Slider Background -->
        <div class="slider-container" id="sliderContainer">
            <div class="slide active" style="background-image: url('slide1.png');"></div>
            <div class="slide" style="background-image: url('slide2.png');"></div>
            <div class="slide" style="background-image: url('slide3.png');"></div>
            <div class="slide" style="background-image: url('slide4.png');"></div>
            <div class="slide" style="background-image: url('slide5.png');"></div>
            <div class="slide" style="background-image: url('slide6.png');"></div>
            <div class="slide" style="background-image: url('slide7.png');"></div>
            <div class="overlay"></div>

            <!-- Navigation Buttons -->
            <div class="slider-nav">
                <button id="prevBtn" class="nav-btn">Back</button>
                <button id="nextBtn" class="nav-btn">Next</button>
            </div>
        </div>

        <!-- Konten dihapus agar hanya menampilkan slider dan bintang -->
    </main>

    <script src="script.js"></script>
</body>

</html>
